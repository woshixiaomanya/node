<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Node.js AI Agent 全栈可视化界面（Vue3版，含上传功能）</title>
    <script src="https://unpkg.com/vue@3/dist/vue.global.prod.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Microsoft YaHei", sans-serif;
        }
        body {
            background-color: #f5f7fa;
            padding: 20px;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: #fff;
            border-radius: 12px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.1);
            overflow: hidden;
        }
        .header {
            background-color: #42b983;
            color: #fff;
            padding: 16px 20px;
            font-size: 18px;
            font-weight: 600;
        }
        .main {
            display: flex;
            height: calc(100vh - 140px);
            padding: 20px;
            gap: 20px;
        }
        .sidebar {
            width: 260px;
            background: #f8f9fa;
            border-radius: 8px;
            padding: 16px;
            overflow-y: auto;
        }
        .sidebar h3 {
            font-size: 16px;
            color: #333;
            margin-bottom: 12px;
            padding-bottom: 8px;
            border-bottom: 1px solid #eee;
        }
        .kb-list {
            list-style: none;
        }
        .kb-item {
            padding: 8px 10px;
            border-radius: 6px;
            margin-bottom: 8px;
            cursor: pointer;
            transition: background 0.2s;
        }
        .kb-item.active {
            background: #e6f7ef;
            color: #42b983;
            font-weight: 500;
        }
        .kb-item:hover:not(.active) {
            background: #eee;
        }
        .btn {
            width: 100%;
            padding: 10px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            transition: background 0.2s;
            margin-top: 12px;
        }
        .btn-primary {
            background: #42b983;
            color: #fff;
        }
        .btn-primary:hover {
            background: #359469;
        }
        .btn-default {
            background: #fff;
            color: #333;
            border: 1px solid #eee;
        }
        .btn-default:hover {
            background: #f5f5f5;
        }
        .upload-btn {
            background: #1890ff;
            color: #fff;
        }
        .upload-btn:hover {
            background: #096dd9;
        }
        .upload-tip {
            font-size: 12px;
            color: #999;
            text-align: center;
            margin-top: 8px;
        }
        .chat-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }
        .chat-history {
            flex: 1;
            overflow-y: auto;
            padding: 16px;
            border: 1px solid #eee;
            border-radius: 8px;
            gap: 16px;
            display: flex;
            flex-direction: column;
        }
        .message {
            max-width: 80%;
            padding: 12px 16px;
            border-radius: 8px;
            line-height: 1.5;
        }
        .user-message {
            align-self: flex-end;
            background: #42b983;
            color: #fff;
        }
        .agent-message {
            align-self: flex-start;
            background: #f1f1f1;
            color: #333;
            white-space: pre-wrap;
        }
        .input-area {
            display: flex;
            gap: 10px;
        }
        #userInput {
            flex: 1;
            padding: 12px 16px;
            border: 1px solid #eee;
            border-radius: 8px;
            font-size: 14px;
            outline: none;
            transition: border 0.2s;
        }
        #userInput:focus {
            border-color: #42b983;
        }
        .send-btn {
            padding: 0 20px;
            background: #42b983;
            color: #fff;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: background 0.2s;
        }
        .send-btn:hover {
            background: #359469;
        }
        .loading {
            font-size: 14px;
            color: #999;
            text-align: center;
            padding: 10px;
        }
        .kb-item {
            padding: 8px 10px;
            border-radius: 6px;
            margin-bottom: 8px;
            cursor: pointer;
            transition: background 0.2s;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .kb-item.active {
            background: #e6f7ef;
            color: #42b983;
            font-weight: 500;
        }
        .kb-item:hover:not(.active) {
            background: #eee;
        }
        .kb-name {
            flex: 1;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
        .delete-icon {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 24px;
            height: 24px;
            border-radius: 4px;
            color: #ff4d4f;
            cursor: pointer;
            transition: all 0.2s;
            margin-left: 8px;
            font-size: 16px;
            font-weight: bold;
        }
        .delete-icon:hover {
            background: #ff4d4f;
            color: #fff;
        }
    </style>
</head>
<body>
    <div id="app" class="container">
        <div class="header">Node.js AI Agent 全栈可视化界面（含知识库上传功能）</div>
        <div class="main">
            <div class="sidebar">
                <h3>知识库列表</h3>
                <ul class="kb-list">
                    <li 
                        v-for="kb in knowledgeList" 
                        :key="kb" 
                        class="kb-item"
                        :class="{ active: currentKB === kb }"
                        @click="switchKB(kb)"
                    >
                         
                        <span class="kb-name">{{ kb }}</span>
                        <span class="delete-icon" @click.stop="deleteKB(kb)" title="删除">×</span>
                    </li>
                <input type="file" id="kbFile" accept=".txt,.pdf,.doc,.docx,.md,.xlsx,.xls" style="display: none;" @change="handleFileSelect">
                <button class="btn upload-btn" @click="triggerUpload">上传知识库</button>
                <p class="upload-tip">支持TXT、PDF、Word、Markdown、Excel格式，最大10MB</p>
                
                <!-- 新增：网页链接导入 -->
                <div style="margin-top: 12px;">
                    <input 
                        type="text" 
                        id="webUrl" 
                        v-model="webUrl"
                        placeholder="输入网页URL..."
                        style="width: 100%; padding: 8px; border: 1px solid #ddd; border-radius: 4px; margin-bottom: 8px;"
                    >
                    <button class="btn upload-btn" @click="importFromWeb">导入网页</button>
                </div>
                
                <!-- 新增：文件夹批量导入 -->
                <input type="file" id="folderUpload" webkitdirectory directory multiple style="display: none;" @change="handleFolderSelect">
                <button class="btn upload-btn" @click="triggerFolderUpload" style="margin-top: 12px; background: #722ed1;">批量导入文件夹</button>
                
                <button class="btn btn-default" @click="clearCache">清空缓存</button>
                <button class="btn btn-default" @click="clearMemory">清空记忆</button>
                <button class="btn btn-default" @click="disableKB">不使用知识库</button>
            </div>
            <div class="chat-container">
                <div class="chat-history" ref="chatHistoryRef">
                    <div class="message agent-message" v-if="chatHistory.length === 0">
                        您好！支持上传.txt格式知识库，上传后可直接切换使用～
                    </div>
                    <div 
                        v-for="(msg, index) in chatHistory" 
                        :key="index" 
                        class="message"
                        :class="{ 'user-message': msg.role === 'user', 'agent-message': msg.role === 'agent' }"
                    >
                        {{ msg.content }}
                    </div>
                    <div class="loading" v-if="loading">Agent正在处理...</div>
                </div>
                <div class="input-area">
                    <input 
                        type="text" 
                        id="userInput" 
                        v-model="userInput"
                        placeholder="请输入问题..."
                        @keyup.enter="sendMessage"
                    >
                    <button class="send-btn" @click="sendMessage" v-disabled="loading">发送</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const { createApp } = Vue;
        createApp({
            data() {
                return {
                    knowledgeList: [],
                    currentKB: '',
                    userInput: '',
                    chatHistory: [],
                    loading: false,
                    selectedFile: null, // 新增：存储选中的上传文件
                    selectedFiles: [], // 新增：批量上传文件列表
                    webUrl: '' // 新增：网页URL
                };
            },
            mounted() {
                this.getKnowledgeList();
            },
            watch: {
                chatHistory: {
                    handler() {
                        this.$nextTick(() => {
                            this.scrollToBottom();
                        });
                    },
                    deep: true
                },
                loading() {
                    this.$nextTick(() => {
                        this.scrollToBottom();
                    });
                }
            },
            methods: {
              scrollToBottom() {
                if (this.$refs.chatHistoryRef) {
                    this.$refs.chatHistoryRef.scrollTop = this.$refs.chatHistoryRef.scrollHeight;
                }
              },
              disableKB(){
                this.currentKB = '';
              },
              async deleteKB(kbName) {
                    if (!confirm(`确定要删除知识库 "${kbName}" 吗？`)) {
                        return;
                    }
                    
                    this.loading = true;
                    try {
                        const res = await fetch('/api/deleteKb', {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({ kbName })
                        });
                        const data = await res.json();
                        if (data.code === 200) {
                            alert(data.message);
                            this.chatHistory.push({
                                role: 'agent',
                                content: data.message
                            });
                            // 删除成功后，重新获取知识库列表
                            await this.getKnowledgeList();
                            // 如果删除的是当前使用的知识库，切换到第一个可用的知识库
                            if (this.currentKB === kbName && this.knowledgeList.length > 0) {
                                this.currentKB = this.knowledgeList[0];
                                await this.switchKB(this.currentKB);
                            }
                        } else {
                            alert('删除失败：' + (data.message || '未知错误'));
                        }
                    } catch (err) {
                        console.error('删除知识库失败：', err);
                        alert('删除知识库失败，请检查后端服务');
                    } finally {
                        this.loading = false;
                    }
                },
                // 原有方法：获取知识库列表（不变）
                async getKnowledgeList() {
                    try {
                        const res = await fetch('/api/knowledge');
                        const data = await res.json();
                        if (data.code === 200) {
                            this.knowledgeList = data.data;
                            if (!this.knowledgeList.includes(this.currentKB) && this.knowledgeList.length > 0) {
                                this.currentKB = this.knowledgeList[0];
                                this.switchKB(this.currentKB);
                            }
                        }
                    } catch (err) {
                        console.error('获取知识库列表失败：', err);
                        alert('获取知识库列表失败，请检查后端服务是否启动');
                    }
                },

                // 原有方法：切换知识库（不变）
                async switchKB(kbName) {
                    if (this.currentKB === kbName) return;
                    this.loading = true;
                    try {
                        const res = await fetch('/api/switchKb', {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({ kbName })
                        });
                        const data = await res.json();
                        if (data.code === 200) {
                            this.currentKB = kbName;
                            this.chatHistory.push({
                                role: 'agent',
                                content: `✅ 已切换至知识库：${kbName}`
                            });
                        } else {
                            alert('切换知识库失败：' + (data.message || '未知错误'));
                        }
                    } catch (err) {
                        console.error('切换知识库失败：', err);
                        alert('切换知识库失败，请检查后端服务');
                    } finally {
                        this.loading = false;
                    }
                },

                // 原有方法：发送消息（不变）
                async sendMessage() {
                    const input = this.userInput.trim();
                    if (!input) return;
                    this.chatHistory.push({ role: 'user', content: input });
                    this.userInput = '';
                    this.loading = true;
                    try {
                        const res = await fetch('/api/chat', {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({ userInput: input, clearMemory: false, currentKB: this.currentKB })
                        });
                        if (!res.ok) throw new Error('请求失败');
                        const reader = res.body.getReader();
                        const decoder = new TextDecoder('utf-8');
                        let agentReply = '';
                        let replyIndex = this.chatHistory.length;
                        this.chatHistory.push({ role: 'agent', content: '' });
                        while (true) {
                            const { done, value } = await reader.read();
                            if (done) break;
                            agentReply += decoder.decode(value);
                            this.chatHistory[replyIndex].content = agentReply;
                            this.$nextTick(() => {
                                this.scrollToBottom();
                            });
                        }
                    } catch (err) {
                        console.error('发送消息失败：', err);
                        this.chatHistory.push({
                            role: 'agent',
                            content: '❌ 消息发送失败，请检查后端服务'
                        });
                    } finally {
                        this.loading = false;
                    }
                },

                // 原有方法：清空缓存（不变）
                async clearCache() {
                    try {
                        const res = await fetch('/api/clearCache');
                        const data = await res.json();
                        if (data.code === 200) {
                            alert(data.message);
                            this.chatHistory.push({ role: 'agent', content: data.message });
                        }
                    } catch (err) {
                        console.error('清空缓存失败：', err);
                        alert('清空缓存失败，请检查后端服务');
                    }
                },

                // 原有方法：清空记忆（不变）
                clearMemory() {
                    this.chatHistory = [];
                    alert('✅ 记忆已清空');
                },

                // 新增：触发文件上传（点击按钮打开文件选择框）
                triggerUpload() {
                    document.getElementById('kbFile').click();
                },

                // 新增：选择文件后处理
                handleFileSelect(e) {
                  const file = e.target.files[0];
                  if (!file) return;
                  
                  // 检查文件大小（10MB限制）
                  if (file.size > 10 * 1024 * 1024) {
                      alert('文件过大，最大支持10MB');
                      return;
                  }
                  
                  this.selectedFile = file;
                  this.uploadKBFile();
                },
                 // 修改：上传知识库文件（支持多种格式）
                async uploadKBFile() {
                    if (!this.selectedFile) {
                        alert('请选择要上传的文件');
                        return;
                    }

                    this.loading = true;
                    const formData = new FormData();
                    formData.append('kbFile', this.selectedFile);
                    
                    try {
                        const res = await fetch('/api/uploadKb', {
                            method: 'POST',
                            body: formData
                        });

                        const data = await res.json();
                        if (data.code === 200) {
                            alert(data.message);
                            this.chatHistory.push({
                                role: 'agent',
                                content: `${data.message}（文件名：${data.data.fileName}）`
                            });
                            await this.getKnowledgeList();
                        } else {
                            alert('上传失败：' + (data.message || '未知错误'));
                        }
                    } catch (err) {
                        console.error('文件上传失败：', err);
                        alert('文件上传失败，请检查后端服务或网络');
                    } finally {
                        this.loading = false;
                        document.getElementById('kbFile').value = '';
                        this.selectedFile = null;
                    }
                },
                 // 新增：触发文件夹上传
                triggerFolderUpload() {
                    document.getElementById('folderUpload').click();
                },
                
                // 新增：选择文件夹后处理
                handleFolderSelect(e) {
                    const files = Array.from(e.target.files);
                    if (files.length === 0) return;
                    
                    this.selectedFiles = files;
                    this.uploadMultipleFiles();
                },
                
                // 新增：批量上传文件
                async uploadMultipleFiles() {
                    if (this.selectedFiles.length === 0) {
                        alert('请选择要上传的文件夹');
                        return;
                    }

                    this.loading = true;
                    let successCount = 0;
                    let failCount = 0;
                    
                    for (const file of this.selectedFiles) {
                        // 只处理支持的文件类型
                        const supportedExtensions = ['.txt', '.pdf', '.doc', '.docx', '.md', '.xlsx', '.xls'];
                        const ext = path.extname(file.name).toLowerCase();
                        
                        if (!supportedExtensions.includes(ext)) {
                            console.log(`跳过不支持的文件：${file.name}`);
                            failCount++;
                            continue;
                        }
                        
                        // 检查文件大小
                        if (file.size > 10 * 1024 * 1024) {
                            console.log(`文件过大，跳过：${file.name}`);
                            failCount++;
                            continue;
                        }
                        
                        const formData = new FormData();
                        formData.append('kbFile', file);
                        
                        try {
                            const res = await fetch('/api/uploadKb', {
                                method: 'POST',
                                body: formData
                            });
                            const data = await res.json();
                            if (data.code === 200) {
                                successCount++;
                            } else {
                                failCount++;
                            }
                        } catch (err) {
                            console.error(`上传失败：${file.name}`, err);
                            failCount++;
                        }
                    }
                    
                    this.chatHistory.push({
                        role: 'agent',
                        content: `✅ 批量导入完成：成功 ${successCount} 个文件，失败 ${failCount} 个文件`
                    });
                    
                    await this.getKnowledgeList();
                    this.loading = false;
                    document.getElementById('folderUpload').value = '';
                    this.selectedFiles = [];
                },
                // 新增：从网页导入
                async importFromWeb() {
                    const url = this.webUrl.trim();
                    if (!url) {
                        alert('请输入网页URL');
                        return;
                    }
                    
                    // 简单的URL验证
                    try {
                        new URL(url);
                    } catch {
                        alert('请输入有效的URL');
                        return;
                    }
                    
                    this.loading = true;
                    try {
                        const res = await fetch('/api/importWeb', {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({ url })
                        });
                        
                        const data = await res.json();
                        if (data.code === 200) {
                            alert(data.message);
                            this.chatHistory.push({
                                role: 'agent',
                                content: `${data.message}（文件名：${data.data.fileName}）`
                            });
                            await this.getKnowledgeList();
                        } else {
                            alert('导入失败：' + (data.message || '未知错误'));
                        }
                    } catch (err) {
                        console.error('网页导入失败：', err);
                        alert('网页导入失败，请检查后端服务或网络');
                    } finally {
                        this.loading = false;
                        this.webUrl = '';
                    }
                }
            }
        }).mount('#app');
    </script>
</body>
</html>
